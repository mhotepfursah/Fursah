<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fursah — Listing Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#120A30;
  --dark-2:#1A1240;
  --light:#FCFAF6;
  --light-2:#F4F0E8;
  --light-3:#EAE4D8;
  --gold:#C8973A;
  --gold-dim:rgba(200,151,58,0.12);
  --text-dark:#0A0423;
  --text-mid:#4A4060;
  --text-muted:#8A80A0;
  --text-white:#F0EDE8;
  --green:#27AE60;
  --red:#C0392B;
  --border:rgba(10,4,35,0.08);
}
html,body{font-family:'Oswald',sans-serif;background:var(--light-2);color:var(--text-dark);min-height:100vh;}

/* ── NAV ── */
.topbar{
  height:64px;background:var(--light);
  border-bottom:1px solid var(--light-3);
  display:flex;align-items:center;
  padding:0 28px;gap:16px;
  position:sticky;top:0;z-index:100;
}
.back-btn{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--text-mid);
  text-decoration:none;cursor:pointer;
  padding:8px 14px;background:var(--light-2);
  border:1px solid var(--light-3);border-radius:10px;
  transition:all .15s;
}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.topbar-logo{font-family:Georgia,serif;font-size:20px;font-weight:800;letter-spacing:3px;color:var(--dark);}
.topbar-tag{font-size:8px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.topbar-badges{display:flex;gap:8px;margin-left:auto;}
.tbadge{padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.tbadge.ready{background:var(--dark);color:white;}
.tbadge.offplan{background:#1A5276;color:white;}
.tbadge.discount{background:var(--gold);color:var(--dark);}
.tbadge.featured{background:rgba(200,151,58,0.15);color:var(--gold);border:1px solid var(--gold);}

/* ── HERO ── */
.hero-img{
  width:100%;height:340px;
  background:linear-gradient(135deg,#1A3050,#0A0423);
  display:flex;align-items:center;justify-content:center;
  font-size:80px;position:relative;overflow:hidden;
}
.hero-img img{width:100%;height:100%;object-fit:cover;}

/* ── PAGE LAYOUT ── */
.page{max-width:1200px;margin:0 auto;padding:28px 28px 60px;display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start;}

/* ── MAIN LEFT ── */
.main-col{}

/* Title block */
.listing-title-block{background:var(--light);border:1px solid var(--border);border-radius:20px;padding:24px 28px;margin-bottom:20px;}
.listing-title{font-size:30px;font-weight:700;color:var(--dark);line-height:1.1;margin-bottom:6px;}
.listing-location{font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.listing-specs{display:flex;gap:20px;flex-wrap:wrap;}
.lspec{display:flex;flex-direction:column;}
.lspec-val{font-size:18px;font-weight:700;color:var(--dark);}
.lspec-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}

/* ── TABS ── */
.tabs-wrap{background:var(--light);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.tabs-nav{display:flex;border-bottom:1px solid var(--light-3);padding:0 8px;}
.tab-btn{
  flex:1;height:48px;border:none;background:transparent;
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;
  cursor:pointer;position:relative;transition:color .15s;
}
.tab-btn:hover{color:var(--text-dark);}
.tab-btn.active{color:var(--dark);}
.tab-btn.active::after{
  content:'';position:absolute;bottom:0;left:8px;right:8px;
  height:2px;background:var(--dark);border-radius:2px 2px 0 0;
}
.tab-content{display:none;padding:24px 28px;}
.tab-content.active{display:block;}

/* Data rows */
.data-section{margin-bottom:24px;}
.data-section:last-child{margin-bottom:0;}
.data-section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--light-3);}
.data-row:last-child{border-bottom:none;}
.data-row span{font-size:13px;color:var(--text-muted);}
.data-row strong{font-size:13px;color:var(--dark);text-align:right;}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--light-2);border-radius:14px;padding:16px;}
.kpi span{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;}
.kpi strong{display:block;font-size:22px;color:var(--dark);margin-top:6px;}

/* Price comparison */
.price-compare{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;}
.pc-item{background:var(--light-2);border-radius:14px;padding:16px;text-align:center;}
.pc-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.pc-val{font-size:18px;font-weight:700;color:var(--dark);}
.pc-item.highlight{background:var(--dark);}
.pc-item.highlight .pc-label{color:rgba(255,255,255,0.5);}
.pc-item.highlight .pc-val{color:var(--light);}

/* Comparables table */
.comp-table{width:100%;border-collapse:collapse;}
.comp-table th{text-align:left;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;padding-bottom:12px;}
.comp-table td{border-top:1px solid var(--light-3);padding:12px 0;font-size:13px;color:var(--text-dark);}

/* Brochure */
.brochure-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.brochure-icon{font-size:48px;margin-bottom:16px;}
.brochure-title{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:8px;}
.brochure-desc{font-size:13px;color:var(--text-muted);margin-bottom:24px;max-width:300px;line-height:1.6;}
.brochure-btn{
  height:48px;padding:0 32px;
  background:var(--dark);color:var(--light);
  border:none;border-radius:12px;
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.brochure-btn:hover{background:var(--dark-2);}
.no-brochure{color:var(--text-muted);font-size:13px;font-style:italic;}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:80px;}
.sidebar-card{background:var(--light);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 8px 24px rgba(10,4,35,0.06);}

/* Price card */
.price-card{background:var(--dark);color:var(--light);border-radius:20px;padding:24px;margin-bottom:16px;}
.price-card-label{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.price-card-amount{font-size:36px;font-weight:700;color:var(--light);line-height:1;margin-bottom:8px;}
.price-card-market{font-size:13px;color:rgba(255,255,255,0.4);text-decoration:line-through;margin-bottom:16px;}
.price-card-badges{display:flex;gap:8px;flex-wrap:wrap;}
.pc-badge{padding:5px 12px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.pc-badge.below{background:rgba(200,151,58,0.15);color:var(--gold);border:1px solid rgba(200,151,58,0.3);}
.pc-badge.commission-yes{background:rgba(39,174,96,0.15);color:var(--green);border:1px solid rgba(39,174,96,0.3);}
.pc-badge.commission-no{background:rgba(192,57,43,0.1);color:var(--red);border:1px solid rgba(192,57,43,0.3);}

/* Quick specs in sidebar */
.sidebar-specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ss-item{background:var(--light-2);border-radius:12px;padding:12px;}
.ss-val{font-size:18px;font-weight:700;color:var(--dark);}
.ss-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}

/* Agent */
.agent-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.agent-av{width:44px;height:44px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--gold);border:1px solid rgba(200,151,58,0.3);flex-shrink:0;}
.agent-info{}
.agent-name{font-size:14px;font-weight:700;color:var(--dark);}
.agent-meta{font-size:11px;color:var(--text-muted);}

/* CTA buttons */
.cta-stack{display:flex;flex-direction:column;gap:10px;}
.cta-btn{
  width:100%;height:50px;border-radius:14px;
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;border:none;
}
.cta-whatsapp{background:#25D366;color:white;}
.cta-whatsapp:hover{background:#20b857;}
.cta-offer{background:var(--dark);color:var(--light);}
.cta-offer:hover{background:var(--dark-2);}

/* Commission row */
.commission-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--light-3);margin-top:4px;}
.commission-label{font-size:12px;color:var(--text-muted);}
.commission-val{font-size:12px;font-weight:700;}
.commission-val.yes{color:var(--green);}
.commission-val.no{color:var(--red);}

/* Distress tag */
.distress-tag{display:inline-block;font-size:10px;font-weight:700;padding:4px 10px;border-radius:4px;border:1px solid currentColor;text-transform:uppercase;letter-spacing:0.3px;}
.reason-relocation{color:#2980B9;}
.reason-mortgage{color:#8E44AD;}
.reason-divorce{color:#C0392B;}
.reason-motivated{color:#E67E22;}
.reason-developer{color:#16A085;}

/* Offer modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,4,35,0.5);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--light);border-radius:24px;padding:32px;width:440px;max-width:calc(100vw - 40px);}
.modal-title{font-size:22px;font-weight:700;color:var(--dark);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.modal-field{margin-bottom:16px;}
.modal-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.modal-input{width:100%;height:44px;background:var(--light-2);border:1px solid var(--light-3);border-radius:12px;padding:0 14px;font-family:'Oswald',sans-serif;font-size:13px;color:var(--dark);outline:none;transition:border-color .15s;}
.modal-input:focus{border-color:var(--gold);}
.modal-textarea{width:100%;height:100px;background:var(--light-2);border:1px solid var(--light-3);border-radius:12px;padding:12px 14px;font-family:'Oswald',sans-serif;font-size:13px;color:var(--dark);outline:none;resize:none;transition:border-color .15s;}
.modal-textarea:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:10px;margin-top:24px;}
.modal-cancel{flex:1;height:46px;background:var(--light-2);border:1px solid var(--light-3);border-radius:12px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--text-mid);cursor:pointer;}
.modal-submit{flex:2;height:46px;background:var(--dark);border:none;border-radius:12px;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:white;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}

@media(max-width:900px){
  .page{grid-template-columns:1fr;}
  .sidebar{position:relative;top:auto;}
  .price-card{order:-1;}
}
</style>
</head>

<!-- PAGE -->

        <button class="tab-btn" onclick="switchTab('brochure',this)">Brochure</button>

      <!-- OVERVIEW TAB -->
      <div class="tab-content active" id="tab-overview">
        <div class="kpi-grid" id="overviewKpis"></div>
        <div class="data-section">
          <div class="data-section-title">Pricing</div>
          <div id="overviewPricing"></div>
        </div>
        <div class="data-section">
          <div class="data-section-title">Property</div>
          <div id="overviewProperty"></div>
        </div>
      </div>

      <!-- DETAILS TAB -->
      <div class="tab-content" id="tab-details">
        <div class="data-section">
          <div class="data-section-title">Unit Specifications</div>
          <div id="detailsUnit"></div>
        </div>
        <div class="data-section">
          <div class="data-section-title">Building</div>
          <div id="detailsBuilding"></div>
        </div>
      </div>

      <!-- MARKET TAB -->
      <div class="tab-content" id="tab-market">
        <div class="data-section-title" style="margin-bottom:12px;">Price per Sqft Comparison</div>
        <div class="price-compare" id="marketCompare"></div>
        <div class="data-section">
          <div class="data-section-title">Area & Building Data</div>
          <div id="marketAreaData"></div>
        </div>
        <div class="data-section">
          <div class="data-section-title">Comparable Transactions</div>
          <table class="comp-table">
            <thead><tr><th>Project</th><th>Type</th><th>Size</th><th>PSF</th><th>Price</th><th>Date</th></tr></thead>
            <tbody id="comparablesBody"></tbody>
          </table>
        </div>
      </div>

      <!-- BROCHURE TAB -->
      <div class="tab-content" id="tab-brochure">
        <div class="brochure-wrap" id="brochureContent"></div>
      </div>

    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Price Card -->
    <div class="price-card" id="sidebarPriceCard"></div>

    <!-- Agent + CTAs -->
    <div class="sidebar-card">
      <div class="agent-row" id="sidebarAgent"></div>
      <div class="cta-stack">
        <button class="cta-btn cta-whatsapp" id="whatsappBtn">📱 WhatsApp Agent</button>
        <button class="cta-btn cta-offer" onclick="openOfferModal()">Submit Offer</button>
      </div>
      <div class="commission-row">
        <span class="commission-label">Buyer Agent Commission</span>
        <span class="commission-val" id="commissionVal"></span>
      </div>
    </div>

    <!-- Quick Specs -->
    <div class="sidebar-card">
      <div class="sidebar-specs" id="sidebarSpecs"></div>
    </div>

  </div>
</div>

<!-- OFFER MODAL -->
<div class="modal-overlay" id="offerModal">
  <div class="modal">
    <div class="modal-title">Submit an Offer</div>
    <div class="modal-sub" id="modalListingName"></div>
    <div class="modal-field">
      <div class="modal-label">Your Offer Price (AED)</div>
      <input class="modal-input" type="number" placeholder="e.g. 3000000" id="offerPrice">
    </div>
    <div class="modal-field">
      <div class="modal-label">Conditions</div>
      <input class="modal-input" type="text" placeholder="e.g. Subject to mortgage approval" id="offerConditions">
    </div>
    <div class="modal-field">
      <div class="modal-label">Message to Agent</div>
      <textarea class="modal-textarea" placeholder="Any additional notes..." id="offerMessage"></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeOfferModal()">Cancel</button>
      <button class="modal-submit" onclick="submitOffer()">Submit Offer</button>
    </div>
  </div>
</div>

// ── INIT ──
const params = new URLSearchParams(window.location.search);
const slug = params.get('deal');
const listing = listings.find(l => l.slug === slug) || listings[0];

function dataRow(label, value){
  return `<div class="data-row"><span>${label}</span><strong>${value}</strong></div>`;
}

function populate(){

  // Hero
  document.getElementById('heroImg').style.background = listing.bg;
  document.getElementById('heroImg').innerHTML = listing.emoji;
  document.title = `Fursah — ${listing.project}`;

  // Topbar badges
  document.getElementById('topbarBadges').innerHTML = `
    <span class="tbadge ${listing.status === 'Off-Plan' ? 'offplan' : 'ready'}">${listing.status}</span>
    <span class="tbadge discount">${listing.discount} Below Market</span>
    ${listing.featured ? '<span class="tbadge featured">Featured Deal</span>' : ''}
    <span class="tbadge" style="background:var(--light-2);color:var(--text-mid);">
      <span class="distress-tag ${listing.reasonClass}">${listing.reason}</span>
    </span>
  `;

  // Title block
  document.getElementById('pageTitle').textContent = listing.project;
  document.getElementById('pageLocation').textContent = listing.location;
  document.getElementById('pageSpecs').innerHTML = `
    <div class="lspec"><div class="lspec-val">${listing.beds}</div><div class="lspec-label">Beds</div></div>
    <div class="lspec"><div class="lspec-val">${listing.baths}</div><div class="lspec-label">Baths</div></div>
    <div class="lspec"><div class="lspec-val">${listing.sqft}</div><div class="lspec-label">Sqft</div></div>
    <div class="lspec"><div class="lspec-val">${listing.view}</div><div class="lspec-label">View</div></div>
    ${listing.floor ? `<div class="lspec"><div class="lspec-val">${listing.floor}</div><div class="lspec-label">Floor</div></div>` : ''}
    ${listing.rowType ? `<div class="lspec"><div class="lspec-val">${listing.rowType}</div><div class="lspec-label">Row</div></div>` : ''}
  `;

  // OVERVIEW TAB
  document.getElementById('overviewKpis').innerHTML = `
    <div class="kpi"><span>Below Market</span><strong>${listing.discountNum}%</strong></div>
    <div class="kpi"><span>Price / Sqft</span><strong>${listing.pricePsf}</strong></div>
    <div class="kpi"><span>Rental Estimate</span><strong>${listing.rentalEstimate}</strong></div>
  `;
  document.getElementById('overviewPricing').innerHTML =
    dataRow('Asking Price', listing.askingPrice) +
    dataRow('Market Estimate', listing.marketPrice) +
    dataRow('Discount', listing.discount + ' below market') +
    dataRow('DLD Transfer Fee', '4% (Dubai) / 2% (Abu Dhabi)') +
    dataRow('Agent Commission', listing.commissionCovered ? 'Covered by Seller' : 'Not Covered by Seller');
  document.getElementById('overviewProperty').innerHTML =
    dataRow('Property Type', listing.propertyType) +
    dataRow('Developer', listing.developer) +
    dataRow('Size', listing.sqft + ' sqft') +
    dataRow('View', listing.view) +
    dataRow('Furnishing', listing.furnishing) +
    dataRow('Parking', listing.parking) +
    dataRow('Service Charge', listing.serviceCharge);

  // DETAILS TAB
  document.getElementById('detailsUnit').innerHTML =
    dataRow('Property Type', listing.propertyType) +
    dataRow('Bedrooms', listing.beds) +
    dataRow('Bathrooms', listing.baths) +
    dataRow('Size', listing.sqft + ' sqft') +
    dataRow('View', listing.view) +
    (listing.floor ? dataRow('Floor Level', listing.floor) : '') +
    (listing.rowType ? dataRow('Row Type', listing.rowType) : '') +

    dataRow('Furnishing', listing.furnishing) +
    dataRow('Parking', listing.parking) +
    dataRow('Service Charge', listing.serviceCharge);

    dataRow('Status', listing.status) +

      <div class="pc-label">This Unit</div>
      <div class="pc-val">${listing.pricePsf}</div>
    </div>

    dataRow('Area Price Growth', listing.areaGrowth) +

       <div class="brochure-desc no-brochure">The listing agent has not uploaded a brochure for this property yet.</div>`;

    <div class="price-card-market">${listing.marketPrice} market est.</div>
    <div class="price-card-badges">
      <span class="pc-badge below">${listing.discount} Below Market</span>
      <span class="pc-badge ${listing.commissionCovered ? 'commission-yes' : 'commission-no'}">
        ${listing.commissionCovered ? '✓ Commission Covered' : '✗ Commission Not Covered'}
      </span>
    </div>
  `;

  // SIDEBAR — Agent
  document.getElementById('sidebarAgent').innerHTML = `
    <div class="agent-av">${listing.agentInitials}</div>
    <div class="agent-info">
      <div class="agent-name">${listing.agentName}</div>
      <div class="agent-meta">Verified Listing Agent · ${listing.date}</div>

  `;
  document.getElementById('whatsappBtn').onclick = () => {
    window.open(`https://wa.me/${listing.agentPhone}?text=Hi, I'm interested in ${listing.project} listed on Fursah.`);
  };

  // SIDEBAR — Commission
  const commVal = document.getElementById('commissionVal');
  commVal.textContent = listing.commissionCovered ? 'Covered by Seller' : 'Not Covered';
  commVal.className = 'commission-val ' + (listing.commissionCovered ? 'yes' : 'no');

  // SIDEBAR — Quick specs
  document.getElementById('sidebarSpecs').innerHTML = `
    <div class="ss-item"><div class="ss-val">${listing.beds}</div><div class="ss-label">Beds</div></div>
    <div class="ss-item"><div class="ss-val">${listing.baths}</div><div class="ss-label">Baths</div></div>
    <div class="ss-item"><div class="ss-val">${listing.sqft}</div><div class="ss-label">Sqft</div></div>
    <div class="ss-item"><div class="ss-val">${listing.view.split(' ')[0]}</div><div class="ss-label">View</div></div>
    ${listing.floor ? `<div class="ss-item"><div class="ss-val">${listing.floor.split(' ')[0]}</div><div class="ss-label">Floor</div></div>` : ''}
    <div class="ss-item"><div class="ss-val">${listing.parking.split(' ')[0]}</div><div class="ss-label">Parking</div></div>
  `;

  // Modal listing name
  document.getElementById('modalListingName').textContent = listing.project + ' · ' + listing.askingPrice;
}

// ── TABS ──
function switchTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── OFFER MODAL ──
function openOfferModal(){ document.getElementById('offerModal').classList.add('open'); }
function closeOfferModal(){ document.getElementById('offerModal').classList.remove('open'); }
function submitOffer(){
  alert('Offer submitted. The listing agent will be notified.');
  closeOfferModal();
}

document.getElementById('offerModal').addEventListener('click', function(e){
  if(e.target === this) closeOfferModal();
});

populate();
